<div class="min-h-screen xl:flex">
  <div>
    <app-sidebar></app-sidebar>
    <app-backdrop></app-backdrop>
  </div>

  <div
    class="flex-1 transition-all duration-300 ease-in-out"
    [ngClass]="{
      'xl:ml-[290px]': (isExpanded$ | async) || (isHovered$ | async),
      'xl:ml-[90px]': !(isExpanded$ | async) && !(isHovered$ | async),
      'ml-0': (isMobileOpen$ | async)
    }"
  >
    <!-- app header start -->
    <app-header></app-header>
    <!-- app header end -->

    <div class="p-4 mx-auto max-w-(--breakpoint-2xl) md:p-6">
      <!-- Lien dans le contenu (démo). Idéalement mets-le dans app-sidebar -->
      <a
        routerLink="/admin/cabinets"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: false }"
        class="flex items-center gap-2 px-3 py-2"
      >
        <span>Cabinets</span>
      </a>

      <router-outlet></router-outlet>
    </div>
  </div>
</div>
